name: CD - Deploy Frontend

on:
  workflow_run:
    workflows: ["CI - Build Frontend"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
      ARTIFACT_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      SWA_NAME: ${{ vars.AZURE_SWA_NAME }}
      SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get latest build artifact folder
        id: get-latest
        run: |
          LATEST_FOLDER=$(az storage blob list \
            --account-name $STORAGE_ACCOUNT \
            --container-name $ARTIFACT_CONTAINER \
            --auth-mode login \
            --query "[].name" \
            --output tsv | cut -d'/' -f1 | grep 'build-artifact-v' | sort -V | tail -n 1)
          echo "folder=$LATEST_FOLDER" >> $GITHUB_OUTPUT

      - name: Download latest artifact
        run: |
          mkdir -p dist
          az storage blob download-batch \
            --account-name $STORAGE_ACCOUNT \
            --auth-mode login \
            --source $ARTIFACT_CONTAINER \
            --destination dist \
            --pattern "${{ steps.get-latest.outputs.folder }}/*"

      - name: Flatten artifact folder
        run: |
          mv dist/${{ steps.get-latest.outputs.folder }}/* dist/
          rm -rf dist/${{ steps.get-latest.outputs.folder }}

      - name: Zip deployment package
        run: |
          cd dist
          zip -r ../deploy.zip .
          cd ..

      - name: Deploy to Static Web App (Production)
        run: |
          swa deploy dist \
            --app-name $SWA_NAME \
            --resource-group $RESOURCE_GROUP \
            --environment-name production

