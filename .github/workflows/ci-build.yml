name: CI - Build Frontend

on:
  push:
    branches: ["main"]
    paths-ignore:
    - '.github/workflows/ci-deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
      ARTIFACT_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER }}        

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload artifact to Blob with versioned folder
        run: |
          # Use GitHub run number to auto-increment version
          VERSION=1.0.${{ github.run_number }}
          echo "Uploading to folder: build-artifact-v$VERSION"

          az storage blob upload-batch \
            --account-name $STORAGE_ACCOUNT \
            --destination $ARTIFACT_CONTAINER/build-artifact-v$VERSION \
            --auth-mode login \
            --source dist